[build]
  builder = "NIXPACKS"
  buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/guns-lol run build && pnpm --filter @workspace/api-server run build"

  [deploy]
  startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
  healthcheckPath = "/api/healthz"
  releaseCommand = "pnpm --filter @workspace/db run push"
  